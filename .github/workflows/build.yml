name: Build

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Pin Gradle to 8.10.2
        run: sed -i 's|gradle-[0-9.]*-bin.zip|gradle-8.10.2-bin.zip|' gradle/wrapper/gradle-wrapper.properties
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
      - name: Build
        run: ./gradlew shadowJar --no-configuration-cache
      - uses: actions/upload-artifact@v4
        with:
          name: Multiverse-Core
          path: build/libs/Multiverse-Core-*.jar
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Multiverse-Core Build
          files: build/libs/Multiverse-Core-*.jar
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
